<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title></title>
<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: black;
}
</style>
</head>
<body>

<audio id="sound" src="sound.mp3"></audio>

<script>
const audio = document.getElementById("sound");

document.addEventListener("click", () => {
    audio.currentTime = 0;
    audio.play();
});
</script>

</body>
</html>
